name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            arch: x64
          - os: windows-latest
            platform: win32
            arch: x64

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install
        run: npm ci

      - name: Build
        run: npx @electron/packager . AI-Browser --platform=${{ matrix.platform }} --arch=${{ matrix.arch }} --out=release --overwrite

      - name: Package (Windows)
        if: matrix.platform == 'win32'
        shell: pwsh
        run: |
          $src = "release/AI-Browser-win32-x64"
          $dst = "release/AI-Browser-win32-x64.zip"
          Compress-Archive -Path "$src/*" -DestinationPath $dst -Force
          Get-Item $dst

      - name: Package (Linux)
        if: matrix.platform == 'linux'
        run: |
          cd release
          tar -czvf AI-Browser-linux-x64.tar.gz AI-Browser-linux-x64
          ls -lh AI-Browser-linux-x64.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AI-Browser-${{ matrix.platform }}-${{ matrix.arch }}
          path: release/AI-Browser-${{ matrix.platform }}-${{ matrix.arch }}*.zip
          retention-days: 1
        continue-on-error: true

      - name: Upload artifact (Linux)
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: AI-Browser-${{ matrix.platform }}-${{ matrix.arch }}
          path: release/AI-Browser-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz
          retention-days: 1
        continue-on-error: true

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List files
        run: |
          echo "=== All files ==="
          find artifacts -type f
          echo "=== Directories ==="
          ls -laR artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/AI-Browser-win32-x64.zip
            artifacts/**/AI-Browser-linux-x64.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

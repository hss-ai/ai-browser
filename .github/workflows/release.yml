name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            arch: x64
          - os: windows-latest
            platform: win32
            arch: x64
          - os: macos-latest
            platform: darwin
            arch: x64

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install
        run: npm ci

      - name: Build
        run: npx @electron/packager . AI-Browser --platform=${{ matrix.platform }} --arch=${{ matrix.arch }} --out=release --overwrite

      - name: Package Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Write-Host "=== Checking release folder ==="
          Get-ChildItem -Path "release" -Recurse | Select-Object Name, Length | Format-Table
          Write-Host "=== Creating zip ==="
          Compress-Archive -Path "release/AI-Browser-win32-x64/*" -DestinationPath "AI-Browser-win32-x64.zip" -Force
          Write-Host "=== Result ==="
          Get-Item AI-Browser-win32-x64.zip | Select-Object Name, Length

      - name: Package Linux
        if: runner.os == 'Linux'
        run: |
          tar -czvf AI-Browser-linux-x64.tar.gz -C release AI-Browser-linux-x64
          ls -lh AI-Browser-linux-x64.tar.gz

      - name: Upload Windows
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: win
          path: AI-Browser-win32-x64.zip

      - name: Upload Linux
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: linux
          path: AI-Browser-linux-x64.tar.gz

      - name: Package macOS
        if: runner.os == 'macOS'
        shell: bash
        run: |
          cd release
          zip -r ../AI-Browser-darwin-x64.zip AI-Browser-darwin-x64
          ls -lh ../AI-Browser-darwin-x64.zip

      - name: Upload macOS
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: darwin
          path: AI-Browser-darwin-x64.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Rename and list
        run: |
          mv artifacts/win/AI-Browser-win32-x64.zip ./AI-Browser-win32-x64.zip
          mv artifacts/linux/AI-Browser-linux-x64.tar.gz ./AI-Browser-linux-x64.tar.gz
          mv artifacts/darwin/AI-Browser-darwin-x64.zip ./AI-Browser-darwin-x64.zip
          ls -lh *.zip *.tar.gz

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            AI-Browser-win32-x64.zip
            AI-Browser-linux-x64.tar.gz
            AI-Browser-darwin-x64.zip
          generate_release_notes: true

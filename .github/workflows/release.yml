name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            arch: x64
          - os: windows-latest
            platform: win32
            arch: x64

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install
        run: npm ci

      - name: Build
        run: npx @electron/packager . AI-Browser --platform=${{ matrix.platform }} --arch=${{ matrix.arch }} --out=release --overwrite

      - name: Package Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "release/AI-Browser-win32-x64/*" -DestinationPath "AI-Browser-win32-x64.zip" -Force
          ls -la AI-Browser-win32-x64.zip

      - name: Package Linux
        if: runner.os == 'Linux'
        run: |
          tar -czvf AI-Browser-linux-x64.tar.gz -C release AI-Browser-linux-x64
          ls -lh AI-Browser-linux-x64.tar.gz

      - name: Upload Windows
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: win
          path: AI-Browser-win32-x64.zip

      - name: Upload Linux
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: linux
          path: AI-Browser-linux-x64.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Rename and list
        run: |
          mv artifacts/win/AI-Browser-win32-x64.zip ./AI-Browser-win32-x64.zip
          mv artifacts/linux/AI-Browser-linux-x64.tar.gz ./AI-Browser-linux-x64.tar.gz
          ls -lh *.zip *.tar.gz

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            AI-Browser-win32-x64.zip
            AI-Browser-linux-x64.tar.gz
          generate_release_notes: true

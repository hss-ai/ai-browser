name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            arch: x64
          - os: windows-latest
            platform: win32
            arch: x64

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install
        run: npm ci

      - name: Build
        run: npx @electron/packager . AI-Browser --platform=${{ matrix.platform }} --arch=${{ matrix.arch }} --out=release --overwrite

      - name: Show output
        run: ls -la release/

      - name: Create zip (Windows)
        if: matrix.platform == 'win32'
        shell: bash
        run: |
          cd release
          dir AI-Browser-win32-x64/ 2>/dev/null || ls AI-Browser-win32-x64/
          powershell -Command "Compress-Archive -Path 'AI-Browser-win32-x64/*' -DestinationPath 'AI-Browser-win32-x64.zip' -Force"
          ls -la AI-Browser-win32-x64.zip

      - name: Create tar.gz (Linux)
        if: matrix.platform == 'linux'
        run: |
          cd release
          ls -la AI-Browser-linux-x64/
          tar -czvf AI-Browser-linux-x64.tar.gz AI-Browser-linux-x64/*
          ls -la AI-Browser-linux-x64.tar.gz

      - name: Upload Windows
        if: matrix.platform == 'win32'
        uses: actions/upload-artifact@v4
        with:
          name: AI-Browser-win32-x64
          path: release/AI-Browser-win32-x64.zip

      - name: Upload Linux
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: AI-Browser-linux-x64
          path: release/AI-Browser-linux-x64.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Show artifacts
        run: ls -la artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**
          generate_release_notes: true

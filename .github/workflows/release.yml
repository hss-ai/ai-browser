name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            arch: x64
          - os: windows-latest
            platform: win32
            arch: x64

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install
        run: npm ci

      - name: Build
        run: |
          echo "Building for ${{ matrix.platform }} ${{ matrix.arch }}"
          npx @electron/packager . AI-Browser --platform=${{ matrix.platform }} --arch=${{ matrix.arch }} --out=release --overwrite

      - name: Show output
        run: |
          echo "=== Release directory ==="
          ls -la release/ 2>/dev/null || echo "No release dir"
          find release -name "*.exe" -o -name "AI-Browser*" 2>/dev/null | head -20

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: AI-Browser-${{ matrix.platform }}-${{ matrix.arch }}
          path: release/

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: AI-Browser-*
          merge-multiple: true

      - name: List files
        run: find artifacts -type f | head -30

      - name: Create
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**
          generate_release_notes: true

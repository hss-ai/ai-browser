name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  attestations: write

jobs:
  release:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-24.04
            platform: linux
            arch: x64
          - os: macos-14
            platform: darwin
            arch: x64
          - os: macos-14
            platform: darwin
            arch: arm64
          - os: windows-latest
            platform: win32
            arch: x64

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Build ${{ matrix.platform }} ${{ matrix.arch }}
        run: |
          npx @electron/packager . AI-Browser \
            --platform=${{ matrix.platform }} \
            --arch=${{ matrix.arch }} \
            --out=release \
            --overwrite \
            --asar \
            --ignore="^/\.git$" \
            --ignore="^/\.github$" \
            --ignore="^/docs$" \
            --ignore="^/\.claude$" \
            --ignore="^/\.opencode$" \
            --ignore="^/\.vscode$" \
            --ignore="^/\.odd$" \
            --ignore="^/\.agents$" \
            --ignore="^/\.mcp\.json$" \
            --ignore="^/opencode\.json$" \
            --ignore="^/AGENTS\.md$" \
            --ignore="^/\.gitignore$"
        env:
          ELECTRON_CACHE: ${{ runner.temp }}/electron-cache
          ELECTRON_BUILDER_CACHE: ${{ runner.temp }}/electron-builder-cache
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: AI-Browser-${{ matrix.platform }}-${{ matrix.arch }}
          path: release/AI-Browser-${{ matrix.platform }}-${{ matrix.arch }}*/
          if-no-files-found: error

  create-release:
    needs: release
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: AI-Browser-*
          merge-multiple: false

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.exe
            artifacts/**/AI-Browser-linux-*/
            artifacts/**/AI-Browser-darwin-*/
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
